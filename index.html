<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>马儿跑酷</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: #1a1a1a;
      font-family: "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    canvas {
      max-width: 100vw;
      max-height: 88vh;
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    #hint {
      margin-top: 14px;
      color: #bbb;
      font-size: 18px;
      letter-spacing: 2px;
      background: rgba(0,0,0,0.4);
      padding: 8px 26px;
      border-radius: 24px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="1920" height="1080"></canvas>
  <div id="hint">按空格键或点击屏幕开始 &nbsp;|&nbsp; P键 / ESC 暂停</div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
